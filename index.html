<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Chúc Mừng Quốc tế Phụ nữ 8/3</title>
    <style>
        /* Reset cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Nền trang web gradient nhẹ nhàng */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            /* Cần perspective để hiệu ứng 3D hoạt động */
            perspective: 2000px;
        }

        /* Container chính cho thiệp */
        .card-container {
            position: relative;
            width: 500px;
            height: 400px;
            transition: transform 1s;
            transform-style: preserve-3d; /* Cho phép các con hiển thị 3D */
            animation: startAppear 1s ease-out forwards;
        }

        /* Bìa thiệp (mở ra từ hai phía) */
        .card-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transform-style: preserve-3d;
            z-index: 20;
            pointer-events: none; /* Không cản trở nội dung bên trong */
        }

        /* Cánh bìa trái */
        .cover-left {
            width: 50%;
            height: 100%;
            background-color: #fca8d1; /* Màu hồng đậm hơn */
            border-radius: 15px 0 0 15px;
            transform-origin: left;
            animation: openCoverLeft 2.5s ease-in-out forwards;
            animation-delay: 1s;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Cánh bìa phải */
        .cover-right {
            width: 50%;
            height: 100%;
            background-color: #fca8d1; /* Màu hồng đậm hơn */
            border-radius: 0 15px 15px 0;
            transform-origin: right;
            animation: openCoverRight 2.5s ease-in-out forwards;
            animation-delay: 1s;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Trang trí bìa ngoài */
        .cover-left h1, .cover-right h1 {
            color: #fff;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            position: absolute;
            width: 100%;
            text-align: center;
        }

        /* Nội dung thiệp bên trong (Glassmorphism) */
        .card-inner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(228, 163, 194, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: fadeInInner 2.5s ease-in-out forwards;
            animation-delay: 1s;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Tiêu đề trong */
        h2 {
            color: #d63384;
            font-size: 2em;
            margin-bottom: 15px;
        }

        /* Lời chúc trong */
        p {
            color: #444;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        /* Trái tim đập */
        .heart {
            color: #ff4757;
            font-size: 4em;
            margin-top: 15px;
            display: inline-block;
            animation: beat 1s infinite alternate;
        }

        /* --- Animations --- */

        /* Xuất hiện thiệp ban đầu */
        @keyframes startAppear {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Mở cánh trái sang trái */
        @keyframes openCoverLeft {
            0% { transform: rotateY(0deg); opacity: 1; }
            40% { transform: rotateY(-90deg); opacity: 0.7; }
            100% { transform: rotateY(-180deg); opacity: 0; }
        }

        /* Mở cánh phải sang phải */
        @keyframes openCoverRight {
            0% { transform: rotateY(0deg); opacity: 1; }
            40% { transform: rotateY(90deg); opacity: 0.7; }
            100% { transform: rotateY(180deg); opacity: 0; }
        }

        /* Hiển thị nội dung bên trong */
        @keyframes fadeInInner {
            0% { opacity: 0; }
            40% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Trái tim đập */
        @keyframes beat {
            to { transform: scale(1.2); }
        }

        /* --- Hoa rơi --- */
        .petal {
            position: absolute;
            background-color: #ffb7b2;
            border-radius: 15px 0px 15px 0px;
            opacity: 0.7;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 1;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); }
        }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .card-container {
                width: 90%;
                height: 250px;
            }
            .cover-left h1, .cover-right h1 {
                font-size: 1.5em;
            }
            h2 {
                font-size: 1.5em;
            }
            p {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        
        <div class="card-cover">
            <div class="cover-left">
                <h1>Chúc</h1>
            </div>
            <div class="cover-right">
                <h1>Mừng 8/3</h1>
            </div>
        </div>

        <div class="card-inner">
            <h2>Chúc mừng 8/3 🎀</h2>
            <p><b>Nhân ngày Quốc tế Phụ nữ</b>, Hải Nam xin gửi đến các chị em những lời chúc tốt đẹp và ngọt ngàoo nhất.</p>
            <p>Chúc nửa thé giới luôn xinh đẹp, rạng rỡ, ngập tràn niềm vui và hạnh phúc. Cảm ơn vì đã luôn là những bông hoa tỏa hương thơm cho đời!</p>
            <div class="heart">❤️</div>
        </div>
    </div>

    <script>
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            petal.style.left = Math.random() * 100 + 'vw';
            
            const size = Math.random() * 15 + 10;
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            
            petal.style.animationDuration = Math.random() * 3 + 4 + 's';
            petal.style.opacity = Math.random() * 0.5 + 0.3;
            
            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 7000);
        }

        setInterval(createPetal, 300);
    </script>

</body>

</html>
